{% comment %} <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <a href="/">Home</a>
        <a href="/accounts/logout/">Logout</a>
        <a href="/accounts/profile/">Profile</a>
        <a href="/accounts/register/">Register</a>
    </div>

</html> {% endcomment %}


<nav class="bg-white border-b border-gray-200">
  <div class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between">

    <a href="/" class="text-xl font-bold text-gray-800">AI Medical Assistant</a>

    <div class="flex items-center gap-5 text-sm">
      <a href="/" class="text-gray-600 hover:text-gray-900">Home</a>
      <a href="/dashboard/" class="text-gray-600 hover:text-gray-900">Dashboard</a>
      
      {% if user.is_authenticated %}
        <a href="/accounts/profile/" class="text-gray-600 hover:text-gray-900">{{ user.username }}</a>
        <a href="/accounts/logout/" class="text-gray-600 hover:text-gray-900">Logout</a>
      {% else %}
        <a href="/accounts/login/" class="text-gray-600 hover:text-gray-900">Login</a>
        <a href="/accounts/register/" class="text-gray-600 hover:text-gray-900">Register</a>
      {% endif %}
    </div>

  </div>
</nav>
